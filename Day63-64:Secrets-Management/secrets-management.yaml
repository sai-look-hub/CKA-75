# secrets-management.yaml
# Complete secrets management examples

---
# 1. Basic Kubernetes Secret
apiVersion: v1
kind: Secret
metadata:
  name: basic-secret
  namespace: default
type: Opaque
stringData:
  username: admin
  password: password123

---
# 2. SealedSecret (encrypted, safe for Git)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: sealed-db-credentials
  namespace: production
spec:
  encryptedData:
    username: AgA...  # Encrypted!
    password: AgB...  # Encrypted!
  template:
    metadata:
      name: db-credentials
    type: Opaque

---
# 3. SecretStore (External Secrets)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: production
spec:
  provider:
    vault:
      server: "https://vault.example.com"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "demo-role"
          serviceAccountRef:
            name: external-secrets-sa

---
# 4. ClusterSecretStore (for all namespaces)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets-system

---
# 5. ExternalSecret (syncs from Vault)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-secret
  namespace: production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: app-credentials
    creationPolicy: Owner
  data:
  - secretKey: username
    remoteRef:
      key: database/prod
      property: username
  - secretKey: password
    remoteRef:
      key: database/prod
      property: password

---
# 6. Deployment using Secret
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app
  namespace: production
  annotations:
    reloader.stakater.com/auto: "true"  # Auto-reload on secret change
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secure-app
  template:
    metadata:
      labels:
        app: secure-app
    spec:
      containers:
      - name: app
        image: nginx
        env:
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: app-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-credentials
              key: password
        volumeMounts:
        - name: secrets
          mountPath: "/etc/secrets"
          readOnly: true
      volumes:
      - name: secrets
        secret:
          secretName: app-credentials

---
# 7. ServiceAccount for External Secrets
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: production

---
# 8. RBAC for Secret Access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-reader
  namespace: production
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["app-credentials"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-secret-reader
  namespace: production
subjects:
- kind: ServiceAccount
  name: app-sa
  namespace: production
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io

---
# 9. ExternalSecret with multiple keys
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: multi-secret
  namespace: production
spec:
  refreshInterval: 5m
  secretStoreRef:
    name: vault-backend
  target:
    name: all-app-secrets
  dataFrom:
  - extract:
      key: app/config

---
# 10. Encryption Configuration (for API server)
# This goes in a file passed to kube-apiserver
apiVersion: apiserver.config.k8s.io/v1
kind: EncryptionConfiguration
resources:
- resources:
  - secrets
  providers:
  - aescbc:
      keys:
      - name: key1
        secret: <BASE64_32_BYTE_KEY>
  - identity: {}
